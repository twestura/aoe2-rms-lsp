# Unified language data for the AoE2 RMS language server.
# Combines hover documentation paths and completion data for all tokens.
#
# Token IDs are from the RMS Equivalencies spreadsheet (rms-equivalences/).
# Tokens not present in the spreadsheet omit the `id` field.
#
# Format:
#   [section.NAME]           — section headers like <LAND_GENERATION>; NAME is written
#                              without angle brackets (e.g. LAND_GENERATION, not <LAND_GENERATION>)
#   [command.name]           — top-level commands inside a section block
#   [attribute.name]         — attributes inside a command block
#   [command_attribute.name] — valid as both command and attribute (base_terrain, base_layer)
#   [keyword.name]           — preprocessor keywords (#define, if, start_random, etc.)
#
# Fields:
#   id       = integer token ID from the equivalencies spreadsheet
#   hover    = path to hover doc, relative to hover_docs/
#   sections = ["NAME", ...] on commands and command_attributes; NAME without angle brackets
#   commands = ["name", ...] on attributes and command_attributes
#   repeatable = true if the token may appear more than once in its context (absent = false);
#              only used on commands and attributes; sections are always repeatable, and
#              keyword repeatability depends on context (e.g. multiple if/endif blocks)
#   args     = [{ name = "X", kind = "Y" }, ...] argument specs
#              add optional = true for optional args
#
# Argument kinds: "terrain", "object", "civilization", "map_type", "effect",
#   "attribute_type", "resource_type", "technology_type", "unit_class",
#   "cliff_type", "season_type", "water_definition", "assign_type",
#   "player_data", "language_string_id", "condition", "label", "number",
#   "filepath", "identifier"


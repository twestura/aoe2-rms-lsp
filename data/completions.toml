# Maps completable token labels to their insertion snippets, grouped by kind.
# An empty string means the label is inserted as-is with no snippet.
# Snippets use LSP snippet syntax: ${N:placeholder} for tab stops,
# $0 for final cursor position.
# See: https://microsoft.github.io/language-server-protocol/specifications/lsp/3.17/specification/#snippet_syntax
# Keys containing <, >, or # must be quoted.
# base_terrain and base_layer appear in both [commands] and [attributes]
# as they are valid in both contexts depending on position.

[sections]
"<PLAYER_SETUP>" = ""
"<LAND_GENERATION>" = ""
"<ELEVATION_GENERATION>" = ""
"<CLIFF_GENERATION>" = ""
